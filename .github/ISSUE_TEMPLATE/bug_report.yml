name: Bug report
description: Report a reproducible defect in bnfn
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Reproductions that isolate the request config, params, and runtime details are the fastest to verify.
  - type: input
    id: version
    attributes:
      label: bnfn version
      placeholder: 0.1.1
    validations:
      required: true
  - type: input
    id: bun_version
    attributes:
      label: Bun version
      placeholder: 1.1.17
    validations:
      required: true
  - type: input
    id: zig_version
    attributes:
      label: Zig version
      placeholder: 0.15.2
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code or commands that reproduce the problem
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or stack trace
      render: text
    validations:
      required: false
