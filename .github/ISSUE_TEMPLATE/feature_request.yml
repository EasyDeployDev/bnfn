name: Feature request
description: Propose a new capability or API change for bnfn
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use feature requests for scoped API additions, transport changes, native-layer work, or developer tooling improvements.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the API, behavior, or workflow you want
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: runtime
    attributes:
      label: Runtime and compatibility impact
      description: Note whether this affects Bun-only scope, Zig requirements, or axios compatibility
    validations:
      required: false
